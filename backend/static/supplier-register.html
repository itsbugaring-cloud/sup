<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supplier Registration Portal</title>
    <meta name="description" content="Official Supplier Registration Portal.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html { font-size: 14px; }
        body {
            font-family: 'Inter', sans-serif;
            background: #f8fafc;
            color: #1a202c;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .register-container {
            width: 100%;
            max-width: 500px;
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.05);
            padding: 2.5rem;
        }

        .brand-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .brand-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #2563eb, #3b82f6);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1rem;
            color: white;
        }
        .brand-title {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: -0.03em;
            color: #0f172a;
        }
        .brand-subtitle {
            font-size: 0.875rem;
            color: #64748b;
            margin-top: 0.25rem;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }
        .form-label {
            display: block;
            font-size: 0.75rem;
            font-weight: 600;
            color: #475569;
            margin-bottom: 0.4rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .form-control {
            width: 100%;
            padding: 0.75rem 1rem;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-family: inherit;
            font-size: 0.875rem;
            color: #1e293b;
            transition: all 0.2s;
        }
        .form-control:focus {
            outline: none;
            background: #ffffff;
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
        }

        .btn-submit {
            width: 100%;
            padding: 0.75rem 1rem;
            background: #2563eb;
            color: #ffffff;
            border: none;
            border-radius: 8px;
            font-size: 0.875rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.5rem;
            margin-top: 1.5rem;
        }
        .btn-submit:hover {
            background: #1d4ed8;
            transform: translateY(-1px);
        }
        .btn-submit:disabled {
            background: #94a3b8;
            cursor: not-allowed;
            transform: none;
        }

        .success-state {
            display: none;
            text-align: center;
            padding: 2rem 0;
        }
        .success-icon {
            width: 64px;
            height: 64px;
            background: #dcfce7;
            color: #16a34a;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
        }

        .toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: #1e293b;
            color: #fff;
            padding: 1rem 1.5rem;
            border-radius: 8px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            font-size: 0.875rem;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.3s ease;
            pointer-events: none;
            z-index: 1000;
        }
        .toast.show {
            opacity: 1;
            transform: translateY(0);
        }
        .toast.error { background: #ef4444; }
    </style>
</head>
<body>

    <div class="register-container" id="form-container">
        <div class="brand-header">
            <div class="brand-icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
            </div>
            <h1 class="brand-title" id="tenant-name">Supplier Portal</h1>
            <p class="brand-subtitle">Submit your company details for review</p>
        </div>

        <form id="register-form" onsubmit="submitRegistration(event)">
            <div class="form-group">
                <label class="form-label">Company Name</label>
                <input type="text" id="company_name" class="form-control" required placeholder="PT. Vendor Sejahtera">
            </div>
            
            <div class="form-group">
                <label class="form-label">NPWP Number</label>
                <input type="text" id="npwp" class="form-control" required placeholder="00.000.000.0-000.000">
            </div>

            <div class="form-group">
                <label class="form-label">Company Address</label>
                <input type="text" id="address" class="form-control" required placeholder="Jl. Sudirman No. 1, Jakarta">
            </div>

            <div style="display:flex; gap:1rem; margin-bottom:1.25rem;">
                <div class="form-group" style="flex:1; margin-bottom:0;">
                    <label class="form-label">City</label>
                    <input type="text" id="city" class="form-control" required placeholder="Jakarta">
                </div>
                <div class="form-group" style="flex:1; margin-bottom:0;">
                    <label class="form-label">Province</label>
                    <input type="text" id="province" class="form-control" required placeholder="DKI Jakarta">
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">Contact Person (PIC)</label>
                <input type="text" id="pic_name" class="form-control" required placeholder="John Doe">
            </div>

            <div style="display:flex; gap:1rem;">
                <div class="form-group" style="flex:1;">
                    <label class="form-label">PIC Phone</label>
                    <input type="text" id="pic_phone" class="form-control" required placeholder="08123456789">
                </div>
                <div class="form-group" style="flex:1;">
                    <label class="form-label">PIC Email</label>
                    <input type="email" id="pic_email" class="form-control" required placeholder="john@vendor.com">
                </div>
            </div>

            <button type="submit" id="btn-submit" class="btn-submit">
                Submit Registration
            </button>
        </form>
    </div>

    <div class="register-container success-state" id="success-container">
        <div class="success-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
        </div>
        <h2 class="brand-title">Registration Submitted!</h2>
        <p class="brand-subtitle" style="margin-top:1rem; font-size:1rem; line-height:1.5;">
            Thank you for registering. Your details have been securely submitted to the system and are currently <b>Pending Review</b>.
            <br><br>Our team will contact you shortly.
        </p>
    </div>

    <!-- Toast -->
    <div id="floating-toast" class="toast"></div>

    <script>
        const API_URL = '/api/v1';
        let tenantSlug = '';

        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            tenantSlug = urlParams.get('company');
            
            if (!tenantSlug) {
                document.getElementById('form-container').innerHTML = `
                    <div style="text-align:center; color:#ef4444;">
                        <h3>Invalid Link</h3>
                        <p>Missing company identifier in URL.</p>
                    </div>`;
            } else {
                // Capitalize slug for display (e.g., pt-sejahtera -> PT Sejahtera)
                const displayName = tenantSlug.split('-').map(word => word.charAt(0).toUpperCase() + word.slice(1)).join(' ');
                document.getElementById('tenant-name').textContent = displayName + " Supplier Portal";
            }
        });

        async function submitRegistration(e) {
            e.preventDefault();
            const btn = document.getElementById('btn-submit');
            
            const payload = {
                company_name: document.getElementById('company_name').value,
                npwp: document.getElementById('npwp').value,
                address: document.getElementById('address').value,
                city: document.getElementById('city').value,
                province: document.getElementById('province').value,
                pic_name: document.getElementById('pic_name').value,
                pic_phone: document.getElementById('pic_phone').value,
                pic_email: document.getElementById('pic_email').value,
                source: "self_registered"
            };

            try {
                btn.disabled = true;
                btn.innerHTML = `Submitting...`;
                
                await axios.post(`${API_URL}/suppliers/public/${tenantSlug}`, payload);
                
                document.getElementById('form-container').style.display = 'none';
                document.getElementById('success-container').style.display = 'block';
                
            } catch (err) {
                console.error(err);
                btn.disabled = false;
                btn.innerHTML = `Submit Registration`;
                showToast(err.response?.data?.detail || 'Failed to submit registration. Please try again.', 'error');
            }
        }

        function showToast(msg, type='success') {
            const el = document.getElementById('floating-toast');
            el.textContent = msg;
            el.className = `toast show ${type}`;
            setTimeout(() => { el.className = `toast ${type}`; }, 3000);
        }
    </script>
</body>
</html>
