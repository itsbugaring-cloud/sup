<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audit Log — Supplier CRM</title>
    <meta name="description" content="View complete audit trail of all actions taken in Supplier CRM.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --brand: #4f8ef7; --accent: #7c3aed; --success: #10b981;
            --warning: #f59e0b; --danger: #ef4444; --info: #06b6d4;
            --bg: #070c18; --surface: #0d1525;
            --border: rgba(255,255,255,0.06); --border-subtle: rgba(255,255,255,0.04); --border-hover: rgba(255,255,255,0.12);
            --text-primary: #f1f5f9; --text-secondary: #94a3b8; --text-muted: #4b5a72;
        }
        html { font-size: 14px; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text-primary); min-height: 100vh; -webkit-font-smoothing: antialiased; }
        body::before { content:''; position:fixed; inset:0; background: radial-gradient(ellipse 60% 40% at 10% 0%, rgba(79,142,247,0.07) 0%, transparent 55%), radial-gradient(ellipse 40% 30% at 90% 100%, rgba(124,58,237,0.05) 0%, transparent 55%); pointer-events:none; z-index:0; }
        body::after { content:''; position:fixed; inset:0; background-image: linear-gradient(rgba(255,255,255,0.012) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.012) 1px, transparent 1px); background-size: 60px 60px; pointer-events:none; z-index:0; }

        /* TOPBAR */
        .topbar { height:64px; background:rgba(7,12,24,0.92); backdrop-filter:blur(20px); border-bottom:1px solid var(--border); position:sticky; top:0; z-index:50; display:flex; align-items:center; padding:0 1.5rem; gap:1rem; }
        .topbar-brand { display:flex; align-items:center; gap:0.75rem; text-decoration:none; flex-shrink:0; }
        .topbar-logo { width:34px; height:34px; background:linear-gradient(135deg,var(--brand),var(--accent)); border-radius:9px; display:flex; align-items:center; justify-content:center; box-shadow:0 4px 12px rgba(79,142,247,0.3); }
        .topbar-logo svg { width:18px; height:18px; color:#fff; }
        .topbar-brand-name { font-size:1rem; font-weight:800; letter-spacing:-0.025em; }
        .topbar-right { margin-left:auto; display:flex; align-items:center; gap:0.75rem; }
        .workspace-badge { display:flex; align-items:center; gap:0.5rem; padding:0.375rem 0.875rem; background:rgba(255,255,255,0.04); border:1px solid var(--border); border-radius:100px; font-size:0.75rem; font-weight:600; color:var(--text-secondary); }
        .workspace-badge::before { content:''; width:6px; height:6px; background:var(--success); border-radius:50%; box-shadow:0 0 6px var(--success); animation:blink 2s ease-in-out infinite; }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.4} }
        .btn-back { display:flex; align-items:center; gap:0.4rem; padding:0.45rem 0.875rem; background:rgba(255,255,255,0.04); border:1px solid var(--border); border-radius:8px; color:var(--text-secondary); font-size:0.75rem; font-weight:600; text-decoration:none; transition:all 0.2s; }
        .btn-back svg { width:13px; height:13px; }
        .btn-back:hover { background:rgba(255,255,255,0.08); color:var(--text-primary); }

        /* MAIN */
        .main { position:relative; z-index:1; max-width:1300px; margin:0 auto; padding:2rem 1.5rem; display:flex; flex-direction:column; gap:1.5rem; }

        /* PAGE HEADER */
        .page-header { display:flex; align-items:flex-start; justify-content:space-between; gap:1rem; flex-wrap:wrap; }
        .page-title { font-size:1.625rem; font-weight:800; letter-spacing:-0.03em; margin-bottom:0.25rem; }
        .page-subtitle { font-size:0.8125rem; color:var(--text-muted); }

        /* FILTERS */
        .filter-panel { background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:1.125rem 1.375rem; }
        .filter-row { display:grid; grid-template-columns:repeat(4,1fr) auto; gap:0.75rem; align-items:end; }
        @media(max-width:900px) { .filter-row { grid-template-columns:1fr 1fr; } }
        @media(max-width:500px) { .filter-row { grid-template-columns:1fr; } }

        .filter-field { display:flex; flex-direction:column; gap:0.3rem; }
        .filter-label { font-size:0.6875rem; font-weight:700; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.07em; }
        .filter-select, .filter-input {
            background:rgba(0,0,0,0.3); border:1px solid var(--border); border-radius:8px;
            color:var(--text-primary); font-size:0.8125rem; font-family:'Inter',sans-serif;
            padding:0.5625rem 0.75rem; outline:none; transition:all 0.2s;
        }
        .filter-select:focus, .filter-input:focus { border-color:var(--brand); box-shadow:0 0 0 3px rgba(79,142,247,0.1); }
        .filter-select option { background:#0d1525; }
        .filter-input::placeholder { color:var(--text-muted); }
        .btn-filter { display:inline-flex; align-items:center; gap:0.4rem; padding:0.5625rem 1rem; background:linear-gradient(135deg,var(--brand),var(--accent)); border:none; border-radius:8px; color:#fff; font-size:0.8125rem; font-weight:700; font-family:'Inter',sans-serif; cursor:pointer; white-space:nowrap; transition:all 0.2s; }
        .btn-filter:hover { transform:translateY(-1px); }
        .btn-filter svg { width:14px; height:14px; }

        /* PANEL */
        .panel { background:var(--surface); border:1px solid var(--border); border-radius:16px; overflow:hidden; }
        .panel-header { display:flex; align-items:center; justify-content:space-between; padding:1rem 1.375rem; border-bottom:1px solid var(--border); background:rgba(0,0,0,0.15); }
        .panel-title { display:flex; align-items:center; gap:0.625rem; font-size:0.9375rem; font-weight:700; }
        .panel-title svg { width:16px; height:16px; color:var(--text-muted); }

        /* TABLE */
        .table-wrap { overflow-x:auto; }
        table { width:100%; border-collapse:collapse; }
        thead th { padding:0.75rem 1.125rem; text-align:left; font-size:0.6875rem; font-weight:700; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.07em; white-space:nowrap; background:rgba(0,0,0,0.2); }
        tbody tr { border-top:1px solid var(--border-subtle); transition:background 0.15s; }
        tbody tr:hover { background:rgba(255,255,255,0.02); }
        tbody td { padding:0.875rem 1.125rem; font-size:0.8125rem; vertical-align:middle; }

        /* ACTION BADGE */
        .action-badge {
            display:inline-flex; align-items:center; gap:0.3rem;
            padding:0.25rem 0.625rem; border-radius:100px;
            font-size:0.6875rem; font-weight:700; letter-spacing:0.04em; text-transform:uppercase;
        }
        .action-create { background:rgba(79,142,247,0.12); color:#93c5fd; border:1px solid rgba(79,142,247,0.2); }
        .action-update { background:rgba(245,158,11,0.1); color:#fcd34d; border:1px solid rgba(245,158,11,0.2); }
        .action-status_change { background:rgba(16,185,129,0.1); color:#6ee7b7; border:1px solid rgba(16,185,129,0.2); }
        .action-soft_delete { background:rgba(239,68,68,0.1); color:#fca5a5; border:1px solid rgba(239,68,68,0.2); }
        .action-restore { background:rgba(6,182,212,0.1); color:#67e8f9; border:1px solid rgba(6,182,212,0.2); }
        .action-document_upload { background:rgba(139,92,246,0.1); color:#c4b5fd; border:1px solid rgba(139,92,246,0.2); }
        .action-document_delete { background:rgba(239,68,68,0.08); color:#fca5a5; border:1px solid rgba(239,68,68,0.15); }

        /* ACTOR TYPE */
        .actor-type { display:inline-flex; align-items:center; padding:0.15rem 0.45rem; border-radius:6px; font-size:0.6875rem; font-weight:600; }
        .actor-web { background:rgba(79,142,247,0.1); color:var(--brand); }
        .actor-telegram { background:rgba(6,182,212,0.1); color:var(--info); }
        .actor-system { background:rgba(255,255,255,0.06); color:var(--text-muted); }

        .entity-link { color:var(--brand); text-decoration:none; font-size:0.75rem; font-family:monospace; }
        .entity-link:hover { text-decoration:underline; }
        .ip-text { font-size:0.72rem; color:var(--text-muted); font-family:monospace; }
        .date-text { font-size:0.75rem; color:var(--text-muted); white-space:nowrap; }

        /* PAGINATION */
        .pagination { display:flex; align-items:center; justify-content:space-between; padding:1rem 1.375rem; border-top:1px solid var(--border); flex-wrap:wrap; gap:0.75rem; }
        .pagination-info { font-size:0.75rem; color:var(--text-muted); }
        .pagination-btns { display:flex; gap:0.375rem; }
        .page-btn { padding:0.375rem 0.75rem; background:transparent; border:1px solid var(--border); border-radius:7px; color:var(--text-secondary); font-size:0.75rem; font-weight:600; font-family:'Inter',sans-serif; cursor:pointer; transition:all 0.2s; }
        .page-btn:hover:not(:disabled) { background:rgba(255,255,255,0.06); color:var(--text-primary); }
        .page-btn.active { background:rgba(79,142,247,0.15); border-color:rgba(79,142,247,0.3); color:var(--brand); }
        .page-btn:disabled { opacity:0.35; cursor:not-allowed; }

        /* LOADING / EMPTY */
        .loading-state, .empty-state { display:flex; flex-direction:column; align-items:center; justify-content:center; padding:4rem 2rem; gap:0.875rem; }
        .spinner-ring { width:32px; height:32px; border:3px solid rgba(255,255,255,0.06); border-top-color:var(--brand); border-radius:50%; animation:spin 0.8s linear infinite; }
        @keyframes spin { to{transform:rotate(360deg)} }
        .loading-state p, .empty-state p { font-size:0.875rem; color:var(--text-muted); }
        .empty-state svg { width:28px; height:28px; color:var(--text-muted); }

        /* TOAST */
        .toast { position:fixed; bottom:1.5rem; right:1.5rem; z-index:9999; display:flex; align-items:center; gap:0.75rem; padding:0.875rem 1.25rem; border-radius:14px; box-shadow:0 16px 48px rgba(0,0,0,0.5); font-size:0.875rem; font-weight:600; max-width:380px; transform:translateY(20px); opacity:0; transition:all 0.3s cubic-bezier(0.34,1.56,0.64,1); pointer-events:none; }
        .toast.show { transform:translateY(0); opacity:1; pointer-events:all; }
        .toast.error { background:rgba(239,68,68,0.15); border:1px solid rgba(239,68,68,0.3); color:#fca5a5; }
    </style>
</head>
<body>

<nav class="topbar">
    <a href="/" class="topbar-brand">
        <div class="topbar-logo">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
        </div>
        <span class="topbar-brand-name">Supplier CRM</span>
    </a>
    <div class="topbar-right">
        <div class="workspace-badge" id="workspace-name">Loading...</div>
        <a href="/" class="btn-back">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5"/><polyline points="12 19 5 12 12 5"/></svg>
            Dashboard
        </a>
    </div>
</nav>

<div class="main">

    <div class="page-header">
        <div>
            <div class="page-title">Audit Log</div>
            <div class="page-subtitle">Complete trail of all actions performed in the system.</div>
        </div>
    </div>

    <!-- FILTERS -->
    <div class="filter-panel">
        <div class="filter-row">
            <div class="filter-field">
                <label class="filter-label">Action</label>
                <select class="filter-select" id="f-action">
                    <option value="">All Actions</option>
                    <option value="create">Create</option>
                    <option value="update">Update</option>
                    <option value="status_change">Status Change</option>
                    <option value="soft_delete">Delete</option>
                    <option value="restore">Restore</option>
                    <option value="document_upload">Document Upload</option>
                    <option value="document_delete">Document Delete</option>
                </select>
            </div>
            <div class="filter-field">
                <label class="filter-label">Actor Type</label>
                <select class="filter-select" id="f-actor-type">
                    <option value="">All Sources</option>
                    <option value="web_user">Web User</option>
                    <option value="telegram_bot">Telegram Bot</option>
                    <option value="system">System</option>
                </select>
            </div>
            <div class="filter-field">
                <label class="filter-label">Entity Type</label>
                <select class="filter-select" id="f-entity-type">
                    <option value="">All Entities</option>
                    <option value="supplier">Supplier</option>
                    <option value="supplier_document">Document</option>
                    <option value="bot_config">Bot Config</option>
                    <option value="tenant">Tenant</option>
                </select>
            </div>
            <div class="filter-field">
                <label class="filter-label">Actor ID / Email</label>
                <input class="filter-input" id="f-actor-id" placeholder="Actor ID...">
            </div>
            <div class="filter-field">
                <button class="btn-filter" onclick="loadLogs(1)">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                    Search
                </button>
            </div>
        </div>
    </div>

    <!-- TABLE PANEL -->
    <div class="panel">
        <div class="panel-header">
            <div class="panel-title">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
                Activity Log
            </div>
            <span id="total-count" style="font-size:0.72rem;color:var(--text-muted);">Loading...</span>
        </div>

        <div class="table-wrap">
            <div id="table-container">
                <div class="loading-state">
                    <div class="spinner-ring"></div>
                    <p>Loading audit logs...</p>
                </div>
            </div>
        </div>

        <div class="pagination" id="pagination" style="display:none;">
            <span class="pagination-info" id="pagination-info"></span>
            <div class="pagination-btns" id="pagination-btns"></div>
        </div>
    </div>

</div>

<div id="floating-toast" class="toast"></div>

<script>
const API = '/api/v1';
let currentPage = 1;
let totalPages = 1;
let totalItems = 0;
const PER_PAGE = 50;

axios.interceptors.request.use(cfg => {
    const token = localStorage.getItem('token');
    if (token) cfg.headers.Authorization = `Bearer ${token}`;
    return cfg;
});

axios.interceptors.response.use(r => r, err => {
    if (err.response?.status === 401) { localStorage.removeItem('token'); window.location.href = '/login.html'; }
    return Promise.reject(err);
});

document.addEventListener('DOMContentLoaded', () => {
    const token = localStorage.getItem('token');
    if (!token) { window.location.href = '/login.html'; return; }
    try {
        const p = JSON.parse(atob(token.split('.')[1]));
        document.getElementById('workspace-name').textContent = p.display_name || p.email;
    } catch(e) {}

    // Pre-fill entity_id from URL if coming from supplier detail
    const params = new URLSearchParams(window.location.search);
    if (params.get('entity_id')) document.getElementById('f-actor-id').value = params.get('entity_id');

    loadLogs(1);
});

async function loadLogs(page) {
    currentPage = page;
    document.getElementById('table-container').innerHTML = `<div class="loading-state"><div class="spinner-ring"></div><p>Loading...</p></div>`;
    document.getElementById('pagination').style.display = 'none';

    const params = {
        page,
        per_page: PER_PAGE,
    };
    const action = document.getElementById('f-action').value;
    const actorType = document.getElementById('f-actor-type').value;
    const entityType = document.getElementById('f-entity-type').value;
    const actorId = document.getElementById('f-actor-id').value.trim();
    if (action) params.action = action;
    if (actorType) params.actor_type = actorType;
    if (entityType) params.entity_type = entityType;
    if (actorId) params.actor_id = actorId;

    try {
        const res = await axios.get(`${API}/audit-logs`, { params });
        const { data, meta } = res.data;
        totalPages = meta.total_pages || 1;
        totalItems = meta.total_items || 0;
        document.getElementById('total-count').textContent = `${totalItems.toLocaleString()} events`;
        renderTable(data);
        renderPagination(meta);
    } catch(err) {
        console.error(err);
        document.getElementById('table-container').innerHTML = `<div class="empty-state"><p style="color:#fca5a5;">Failed to load logs. Try again.</p></div>`;
    }
}

const ACTION_LABELS = {
    create: 'Create', update: 'Update', status_change: 'Status Change',
    soft_delete: 'Delete', restore: 'Restore', document_upload: 'Doc Upload', document_delete: 'Doc Delete',
};

function renderTable(logs) {
    if (!logs?.length) {
        document.getElementById('table-container').innerHTML = `<div class="empty-state">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
            <p>No audit events found for the current filters.</p>
        </div>`;
        return;
    }

    const rows = logs.map(log => {
        const actionClass = `action-${log.action || 'update'}`;
        const actionLabel = ACTION_LABELS[log.action] || log.action;

        const actorTypeClass = log.actor_type === 'web_user' ? 'actor-web' : log.actor_type === 'telegram_bot' ? 'actor-telegram' : 'actor-system';
        const actorDisplay = escHtml(log.actor_display_name || log.actor_id || 'System');

        const entityLink = log.entity_type === 'supplier' && log.entity_id
            ? `<a href="/supplier-detail.html?id=${log.entity_id}" class="entity-link">${log.entity_id.substring(0,12)}...</a>`
            : `<span class="entity-link" style="color:var(--text-muted);">${log.entity_id ? log.entity_id.substring(0,12)+'...' : '—'}</span>`;

        const changes = log.changes ? `<div style="font-size:0.72rem;color:var(--text-muted);margin-top:0.2rem;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${escHtml(JSON.stringify(log.changes))}</div>` : '';

        return `<tr>
            <td class="date-text">${fmtDate(log.created_at)}</td>
            <td><span class="action-badge ${actionClass}">${actionLabel}</span>${changes}</td>
            <td>
                <div style="font-size:0.72rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:0.2rem;">${log.entity_type || '—'}</div>
                ${entityLink}
            </td>
            <td>
                <div style="font-size:0.8125rem;font-weight:600;color:var(--text-secondary);">${actorDisplay}</div>
                <span class="actor-type ${actorTypeClass}">${log.actor_type || 'system'}</span>
            </td>
            <td class="ip-text">${log.ip_address || '—'}</td>
            <td class="date-text">${log.request_id ? `<span style="font-family:monospace;font-size:0.6875rem;">${log.request_id.substring(0,8)}</span>` : '—'}</td>
        </tr>`;
    }).join('');

    document.getElementById('table-container').innerHTML = `
        <table>
            <thead>
                <tr>
                    <th>Timestamp</th>
                    <th>Action</th>
                    <th>Entity</th>
                    <th>Actor</th>
                    <th>IP Address</th>
                    <th>Request ID</th>
                </tr>
            </thead>
            <tbody>${rows}</tbody>
        </table>`;
}

function renderPagination(meta) {
    const pagination = document.getElementById('pagination');
    if (meta.total_pages <= 1) { pagination.style.display = 'none'; return; }
    pagination.style.display = 'flex';

    const start = (meta.page - 1) * meta.per_page + 1;
    const end = Math.min(meta.page * meta.per_page, meta.total_items);
    document.getElementById('pagination-info').textContent = `Showing ${start}–${end} of ${meta.total_items.toLocaleString()} events`;

    const btns = [];
    btns.push(`<button class="page-btn" onclick="loadLogs(${meta.page - 1})" ${!meta.has_prev ? 'disabled' : ''}>‹ Prev</button>`);
    const start_ = Math.max(1, meta.page - 2);
    const end_ = Math.min(meta.total_pages, meta.page + 2);
    for (let i = start_; i <= end_; i++) {
        btns.push(`<button class="page-btn ${i === meta.page ? 'active' : ''}" onclick="loadLogs(${i})">${i}</button>`);
    }
    btns.push(`<button class="page-btn" onclick="loadLogs(${meta.page + 1})" ${!meta.has_next ? 'disabled' : ''}>Next ›</button>`);
    document.getElementById('pagination-btns').innerHTML = btns.join('');
}

let toastTimer;
function showToast(msg, type) {
    const t = document.getElementById('floating-toast');
    clearTimeout(toastTimer);
    t.className = `toast ${type}`;
    t.innerHTML = `<span>${msg}</span>`;
    requestAnimationFrame(() => requestAnimationFrame(() => t.classList.add('show')));
    toastTimer = setTimeout(() => t.classList.remove('show'), 4000);
}

function fmtDate(dt) { if (!dt) return '—'; return new Date(dt).toLocaleString('id-ID', {day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false}); }
function escHtml(str) { if (!str) return ''; return str.toString().replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;'); }
</script>
</body>
</html>
