<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supplier CRM - SaaS Access</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: '#1E3A5F', secondary: '#F0F4F8' }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50 text-gray-900 font-sans antialiased min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-md bg-white shadow-xl rounded-2xl overflow-hidden border border-gray-100">
        <div class="bg-primary px-6 py-8 text-center">
            <div class="mx-auto w-12 h-12 bg-white/10 rounded-full flex items-center justify-center mb-4">
                <i data-lucide="building-2" class="text-white h-6 w-6"></i>
            </div>
            <h2 class="text-2xl font-bold text-white">Supplier CRM</h2>
            <p class="text-blue-200 mt-1 text-sm">Enterprise Multi-Tenant SaaS</p>
        </div>

        <div class="p-6 sm:p-8">
            <!-- Error Alert -->
            <div id="error-alert" class="hidden mb-6 bg-red-50 border-l-4 border-red-500 p-4 rounded-md">
                <p id="error-msg" class="text-sm text-red-700"></p>
            </div>

            <!-- Login Form -->
            <form id="login-form" class="space-y-5">
                <div>
                    <label class="block text-sm font-medium text-gray-700">Work Email</label>
                    <input type="email" id="login-email" required 
                        class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-primary focus:border-primary sm:text-sm" />
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Password</label>
                    <input type="password" id="login-password" required
                        class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-primary focus:border-primary sm:text-sm" />
                </div>
                <button type="submit" id="login-btn"
                    class="w-full flex justify-center py-2.5 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-primary hover:bg-blue-800 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary disabled:opacity-50 transition-colors">
                    Sign In to Dashboard
                </button>
                <p class="text-center text-sm text-gray-600 mt-4">
                    Don't have an account? <a href="#" id="go-to-register" class="text-primary hover:underline font-medium">Register your company</a>
                </p>
            </form>

            <!-- Register Form -->
            <form id="register-form" class="hidden space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700">Company Name</label>
                    <input type="text" id="reg-company" required 
                        class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-primary focus:border-primary sm:text-sm" />
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Workspace Slug</label>
                    <div class="mt-1 flex rounded-md shadow-sm">
                        <span class="inline-flex items-center px-3 rounded-l-md border border-r-0 border-gray-300 bg-gray-50 text-gray-500 sm:text-sm">crm.com/</span>
                        <input type="text" id="reg-slug" required 
                            class="flex-1 min-w-0 block w-full px-3 py-2 rounded-none rounded-r-md border border-gray-300 focus:ring-primary focus:border-primary sm:text-sm" />
                    </div>
                </div>
                <div class="pt-2 border-t border-gray-100"></div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Your Full Name</label>
                    <input type="text" id="reg-name" required 
                        class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-primary focus:border-primary sm:text-sm" />
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Admin Email</label>
                    <input type="email" id="reg-email" required 
                        class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-primary focus:border-primary sm:text-sm" />
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Admin Password (min 8 chars)</label>
                    <input type="password" id="reg-password" required minlength="8"
                        class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-primary focus:border-primary sm:text-sm" />
                </div>
                <button type="submit" id="register-btn"
                    class="w-full flex justify-center py-2.5 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-green-600 hover:bg-green-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-green-500 disabled:opacity-50 mt-4 transition-colors">
                    Create SaaS Account
                </button>
                <p class="text-center text-sm text-gray-600 mt-4">
                    Already registered? <a href="#" id="go-to-login" class="text-primary hover:underline font-medium">Back to Sign In</a>
                </p>
            </form>
        </div>
    </div>

    <script>
        lucide.createIcons();

        const loginForm = document.getElementById('login-form');
        const registerForm = document.getElementById('register-form');
        const errorAlert = document.getElementById('error-alert');
        const errorMsg = document.getElementById('error-msg');
        
        const loginBtn = document.getElementById('login-btn');
        const registerBtn = document.getElementById('register-btn');

        const regCompany = document.getElementById('reg-company');
        const regSlug = document.getElementById('reg-slug');

        function showError(msg) {
            errorMsg.textContent = msg;
            errorAlert.classList.remove('hidden');
        }

        function hideError() {
            errorAlert.classList.add('hidden');
        }

        document.getElementById('go-to-register').addEventListener('click', (e) => {
            e.preventDefault();
            hideError();
            loginForm.classList.add('hidden');
            registerForm.classList.remove('hidden');
        });

        document.getElementById('go-to-login').addEventListener('click', (e) => {
            e.preventDefault();
            hideError();
            registerForm.classList.add('hidden');
            loginForm.classList.remove('hidden');
        });

        // Auto-fill slug
        regCompany.addEventListener('input', (e) => {
            regSlug.value = e.target.value.toLowerCase().replace(/[^a-z0-9]/g, '-');
        });

        // Handle Login
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            hideError();
            loginBtn.disabled = true;
            loginBtn.textContent = 'Authenticating...';

            try {
                const res = await axios.post('/api/v1/auth/login', {
                    email: document.getElementById('login-email').value,
                    password: document.getElementById('login-password').value
                });
                localStorage.setItem('token', res.data.data.access_token);
                window.location.href = '/';
            } catch (err) {
                showError(err.response?.data?.detail || 'Login failed. Please check credentials.');
            } finally {
                loginBtn.disabled = false;
                loginBtn.textContent = 'Sign In to Dashboard';
            }
        });

        // Handle Register
        registerForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            hideError();
            registerBtn.disabled = true;
            registerBtn.textContent = 'Creating workspace...';

            try {
                const res = await axios.post('/api/v1/auth/register', {
                    company_name: regCompany.value,
                    company_slug: regSlug.value,
                    email: document.getElementById('reg-email').value,
                    password: document.getElementById('reg-password').value,
                    display_name: document.getElementById('reg-name').value
                });
                localStorage.setItem('token', res.data.data.access_token);
                alert("Registration successful! Welcome to your CRM dashboard.");
                window.location.href = '/';
            } catch (err) {
                showError(err.response?.data?.detail || 'Registration failed.');
            } finally {
                registerBtn.disabled = false;
                registerBtn.textContent = 'Create SaaS Account';
            }
        });
    </script>
</body>
</html>
