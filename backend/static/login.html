<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supplier CRM - SaaS Access</title>
    
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: '#1E3A5F', secondary: '#F0F4F8' }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50 text-gray-900 font-sans antialiased min-h-screen flex items-center justify-center p-4">

    <div id="root" class="w-full max-w-md"></div>

    <script type="text/babel">
        function useLucide() {
            React.useEffect(() => { lucide.createIcons(); });
        }

        function App() {
            useLucide();
            const [mode, setMode] = React.useState('login'); // 'login' or 'register'
            const [loading, setLoading] = React.useState(false);
            const [error, setError] = React.useState('');
            
            // Login State
            const [email, setEmail] = React.useState('');
            const [password, setPassword] = React.useState('');

            // Register State
            const [companyName, setCompanyName] = React.useState('');
            const [companySlug, setCompanySlug] = React.useState('');
            const [displayName, setDisplayName] = React.useState('');

            const handleLogin = async (e) => {
                e.preventDefault();
                setError('');
                setLoading(true);
                try {
                    const res = await axios.post('/api/v1/auth/login', { email, password });
                    localStorage.setItem('token', res.data.data.access_token);
                    window.location.href = '/';
                } catch (err) {
                    setError(err.response?.data?.detail || 'Login failed. Please check credentials.');
                } finally {
                    setLoading(false);
                }
            };

            const handleRegister = async (e) => {
                e.preventDefault();
                setError('');
                setLoading(true);
                try {
                    const res = await axios.post('/api/v1/auth/register', {
                        company_name: companyName,
                        company_slug: companySlug.toLowerCase().replace(/[^a-z0-9]/g, '-'),
                        email: email,
                        password: password,
                        display_name: displayName
                    });
                    localStorage.setItem('token', res.data.data.access_token);
                    alert("Registration successful! Welcome to your CRM dashboard.");
                    window.location.href = '/';
                } catch (err) {
                    setError(err.response?.data?.detail || 'Registration failed.');
                } finally {
                    setLoading(false);
                }
            };

            return (
                <div className="bg-white shadow-xl rounded-2xl overflow-hidden border border-gray-100">
                    <div className="bg-primary px-6 py-8 text-center">
                        <div className="mx-auto w-12 h-12 bg-white/10 rounded-full flex items-center justify-center mb-4">
                            <i data-lucide="building-2" className="text-white h-6 w-6"></i>
                        </div>
                        <h2 className="text-2xl font-bold text-white">Supplier CRM</h2>
                        <p className="text-blue-200 mt-1 text-sm">Enterprise Multi-Tenant SaaS</p>
                    </div>

                    <div className="p-6 sm:p-8">
                        {error && (
                            <div className="mb-6 bg-red-50 border-l-4 border-red-500 p-4 rounded-md">
                                <div className="flex">
                                    <div className="ml-3">
                                        <p className="text-sm text-red-700">{error}</p>
                                    </div>
                                </div>
                            </div>
                        )}

                        {mode === 'login' ? (
                            <form onSubmit={handleLogin} className="space-y-5">
                                <div>
                                    <label className="block text-sm font-medium text-gray-700">Work Email</label>
                                    <input type="email" required value={email} onChange={e => setEmail(e.target.value)} 
                                        className="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-primary focus:border-primary sm:text-sm" />
                                </div>
                                <div>
                                    <label className="block text-sm font-medium text-gray-700">Password</label>
                                    <input type="password" required value={password} onChange={e => setPassword(e.target.value)}
                                        className="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-primary focus:border-primary sm:text-sm" />
                                </div>
                                <button type="submit" disabled={loading}
                                    className="w-full flex justify-center py-2.5 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-primary hover:bg-blue-800 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary disabled:opacity-50 transition-colors">
                                    {loading ? 'Authenticating...' : 'Sign In to Dashboard'}
                                </button>
                                <p className="text-center text-sm text-gray-600 mt-4">
                                    Don't have an account? <a href="#" onClick={(e) => {e.preventDefault(); setMode('register');}} className="text-primary hover:underline font-medium">Register your company</a>
                                </p>
                            </form>
                        ) : (
                            <form onSubmit={handleRegister} className="space-y-4">
                                <div>
                                    <label className="block text-sm font-medium text-gray-700">Company Name</label>
                                    <input type="text" required value={companyName} onChange={e => {setCompanyName(e.target.value); setCompanySlug(e.target.value.toLowerCase().replace(/[^a-z0-9]/g, '-'));}}
                                        className="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-primary focus:border-primary sm:text-sm" />
                                </div>
                                <div>
                                    <label className="block text-sm font-medium text-gray-700">Workspace Slug</label>
                                    <div className="mt-1 flex rounded-md shadow-sm">
                                        <span className="inline-flex items-center px-3 rounded-l-md border border-r-0 border-gray-300 bg-gray-50 text-gray-500 sm:text-sm">crm.com/</span>
                                        <input type="text" required value={companySlug} onChange={e => setCompanySlug(e.target.value)}
                                            className="flex-1 min-w-0 block w-full px-3 py-2 rounded-none rounded-r-md border border-gray-300 focus:ring-primary focus:border-primary sm:text-sm" />
                                    </div>
                                </div>
                                <div className="pt-2 border-t border-gray-100"></div>
                                <div>
                                    <label className="block text-sm font-medium text-gray-700">Your Full Name</label>
                                    <input type="text" required value={displayName} onChange={e => setDisplayName(e.target.value)}
                                        className="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-primary focus:border-primary sm:text-sm" />
                                </div>
                                <div>
                                    <label className="block text-sm font-medium text-gray-700">Admin Email</label>
                                    <input type="email" required value={email} onChange={e => setEmail(e.target.value)}
                                        className="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-primary focus:border-primary sm:text-sm" />
                                </div>
                                <div>
                                    <label className="block text-sm font-medium text-gray-700">Admin Password (min 8 chars)</label>
                                    <input type="password" required minLength="8" value={password} onChange={e => setPassword(e.target.value)}
                                        className="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-primary focus:border-primary sm:text-sm" />
                                </div>
                                <button type="submit" disabled={loading}
                                    className="w-full flex justify-center py-2.5 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-green-600 hover:bg-green-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-green-500 disabled:opacity-50 mt-4 transition-colors">
                                    {loading ? 'Creating workspace...' : 'Create SaaS Account'}
                                </button>
                                <p className="text-center text-sm text-gray-600 mt-4">
                                    Already registered? <a href="#" onClick={(e) => {e.preventDefault(); setMode('login');}} className="text-primary hover:underline font-medium">Back to Sign In</a>
                                </p>
                            </form>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
