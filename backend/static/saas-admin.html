<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaaS Super Admin - Supplier CRM</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6;
        }
        .spinner {
            border: 3px solid rgba(0,0,0,0.1);
            width: 24px;
            height: 24px;
            border-radius: 50%;
            border-left-color: #ffffff;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <!-- Top Navigation -->
    <nav class="bg-gray-900 text-white shadow-lg sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center space-x-3">
                    <i data-lucide="shield" class="h-6 w-6 text-blue-400"></i>
                    <span class="font-bold text-xl tracking-tight">SaaS Control Panel</span>
                </div>
                <div class="flex items-center space-x-4">
                    <span id="admin-name" class="text-sm font-medium text-gray-300"></span>
                    <button onclick="handleLogout()" class="text-sm text-gray-400 hover:text-white transition-colors">
                        Logout
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        
        <!-- Error Alert -->
        <div id="error-alert" class="hidden mb-6 bg-red-100 border-l-4 border-red-500 text-red-700 p-4 rounded shadow-sm">
            <div class="flex items-center">
                <i data-lucide="alert-circle" class="h-5 w-5 mr-2"></i>
                <p id="error-message" class="font-medium"></p>
            </div>
        </div>

        <!-- Dashboard Stats -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
            <div class="bg-white rounded-xl shadow-sm p-6 border border-gray-100">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-sm font-medium text-gray-500">Total Tenants</p>
                        <p id="stat-total-tenants" class="text-3xl font-bold text-gray-900 mt-1">-</p>
                    </div>
                    <div class="p-3 bg-blue-50 text-blue-600 rounded-lg">
                        <i data-lucide="building-2" class="h-6 w-6"></i>
                    </div>
                </div>
            </div>
            
            <div class="bg-white rounded-xl shadow-sm p-6 border border-gray-100">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-sm font-medium text-gray-500">Active Tenants</p>
                        <p id="stat-active-tenants" class="text-3xl font-bold text-green-600 mt-1">-</p>
                    </div>
                    <div class="p-3 bg-green-50 text-green-600 rounded-lg">
                        <i data-lucide="check-circle-2" class="h-6 w-6"></i>
                    </div>
                </div>
            </div>

            <div class="bg-white rounded-xl shadow-sm p-6 border border-gray-100">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-sm font-medium text-gray-500">Total Users</p>
                        <p id="stat-total-users" class="text-3xl font-bold text-gray-900 mt-1">-</p>
                    </div>
                    <div class="p-3 bg-purple-50 text-purple-600 rounded-lg">
                        <i data-lucide="users" class="h-6 w-6"></i>
                    </div>
                </div>
            </div>

            <div class="bg-white rounded-xl shadow-sm p-6 border border-gray-100">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-sm font-medium text-gray-500">Total Suppliers</p>
                        <p id="stat-total-suppliers" class="text-3xl font-bold text-gray-900 mt-1">-</p>
                    </div>
                    <div class="p-3 bg-orange-50 text-orange-600 rounded-lg">
                        <i data-lucide="boxes" class="h-6 w-6"></i>
                    </div>
                </div>
            </div>
        </div>

        <!-- Tenant Data Table -->
        <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
            <div class="px-6 py-5 border-b border-gray-100 flex justify-between items-center bg-gray-50">
                <h3 class="text-lg font-semibold text-gray-800">Registered Companies (Tenants)</h3>
                <button onclick="fetchData()" class="text-gray-500 hover:text-gray-700 transition flex items-center text-sm font-medium">
                    <i data-lucide="refresh-cw" class="h-4 w-4 mr-1"></i> Refresh
                </button>
            </div>
            
            <div class="overflow-x-auto">
                <table class="min-w-full divide-y divide-gray-200">
                    <thead class="bg-white">
                        <tr>
                            <th class="px-6 py-3 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">Company Name</th>
                            <th class="px-6 py-3 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">Workspace Slug</th>
                            <th class="px-6 py-3 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">Status</th>
                            <th class="px-6 py-3 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">Created At</th>
                            <th class="px-6 py-3 text-right text-xs font-semibold text-gray-500 uppercase tracking-wider">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="tenant-table-body" class="bg-white divide-y divide-gray-200">
                        <!-- Rows will be injected here via JS -->
                    </tbody>
                </table>
                <div id="loading-indicator" class="py-12 flex justify-center items-center">
                    <div class="spinner border-gray-300 border-l-blue-600"></div>
                </div>
            </div>
        </div>

    </div>

    <script>
        // API Base URL
        const API_URL = '/api/v1';

        // Axios Interceptor for Auth Token
        axios.interceptors.request.use(config => {
            const token = localStorage.getItem('access_token');
            if (token) {
                config.headers.Authorization = `Bearer ${token}`;
            }
            return config;
        });

        // Initialize Lucide Icons
        lucide.createIcons();

        // On Load
        document.addEventListener('DOMContentLoaded', () => {
            const token = localStorage.getItem('access_token');
            if (!token) {
                window.location.href = '/login.html';
                return;
            }

            // Simple JWT decode to check superadmin
            try {
                const payload = JSON.parse(atob(token.split('.')[1]));
                document.getElementById('admin-name').innerText = `Super Admin: ${payload.display_name || payload.email}`;
                
                if (!payload.is_superadmin) {
                    showError("Access Denied: You do not have Super Admin privileges.");
                    return;
                }
            } catch (e) {
                console.error("Token parse error", e);
            }

            fetchData();
        });

        function showError(msg) {
            document.getElementById('error-alert').classList.remove('hidden');
            document.getElementById('error-message').innerText = msg;
            document.getElementById('loading-indicator').classList.add('hidden');
        }

        function hideError() {
            document.getElementById('error-alert').classList.add('hidden');
        }

        async function fetchData() {
            hideError();
            document.getElementById('loading-indicator').classList.remove('hidden');
            document.getElementById('tenant-table-body').innerHTML = '';

            try {
                // Fetch Stats
                const statsRes = await axios.get(`${API_URL}/saas-admin/stats`);
                document.getElementById('stat-total-tenants').innerText = statsRes.data.total_tenants;
                document.getElementById('stat-active-tenants').innerText = statsRes.data.active_tenants;
                document.getElementById('stat-total-users').innerText = statsRes.data.total_users;
                document.getElementById('stat-total-suppliers').innerText = statsRes.data.total_suppliers;

                // Fetch Tenants
                const tenantsRes = await axios.get(`${API_URL}/saas-admin/tenants`);
                renderTenants(tenantsRes.data.data);
                
            } catch (error) {
                console.error(error);
                if (error.response?.status === 401 || error.response?.status === 403) {
                    showError("Unauthorized: You must be a Super Admin to view this page.");
                } else {
                    showError("Failed to load SaaS data. Please check your connection.");
                }
            } finally {
                document.getElementById('loading-indicator').classList.add('hidden');
            }
        }

        function renderTenants(tenants) {
            const tbody = document.getElementById('tenant-table-body');
            
            if (tenants.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5" class="px-6 py-8 text-center text-gray-500">No companies registered yet.</td></tr>`;
                return;
            }

            let html = '';
            tenants.forEach(t => {
                const date = new Date(t.created_at).toLocaleDateString();
                const statusBadge = t.is_active 
                    ? `<span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full bg-green-100 text-green-800">Active</span>`
                    : `<span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full bg-red-100 text-red-800">Suspended</span>`;
                
                const actionBtn = t.is_active
                    ? `<button onclick="toggleTenant('${t.id}', false)" class="text-sm font-medium text-red-600 hover:text-red-900 bg-red-50 hover:bg-red-100 px-3 py-1 rounded transition">Suspend</button>`
                    : `<button onclick="toggleTenant('${t.id}', true)" class="text-sm font-medium text-green-600 hover:text-green-900 bg-green-50 hover:bg-green-100 px-3 py-1 rounded transition">Activate</button>`;

                html += `
                    <tr class="hover:bg-gray-50">
                        <td class="px-6 py-4 whitespace-nowrap">
                            <div class="text-sm font-medium text-gray-900">${t.name}</div>
                            <div class="text-sm text-gray-500">${t.id.substring(0, 8)}...</div>
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap">
                            <div class="text-sm text-gray-600 font-mono bg-gray-100 px-2 py-1 rounded inline-block">/${t.slug}</div>
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap">
                            ${statusBadge}
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">
                            ${date}
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium">
                            ${actionBtn}
                        </td>
                    </tr>
                `;
            });

            tbody.innerHTML = html;
        }

        async function toggleTenant(id, isActive) {
            const actionStr = isActive ? 'activate' : 'suspend';
            if (!confirm(`Are you sure you want to ${actionStr} this tenant?`)) return;

            try {
                await axios.post(`${API_URL}/saas-admin/tenants/${id}/toggle`, { is_active: isActive });
                fetchData(); // reload
            } catch (error) {
                console.error(error);
                alert("Failed to toggle tenant status.");
            }
        }

        function handleLogout() {
            localStorage.removeItem('access_token');
            window.location.href = '/login.html';
        }

    </script>
</body>
</html>
