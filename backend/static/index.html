<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supplier CRM - Dashboard</title>
    
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Axios -->
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        primary: {
                            50: '#f0f4f8',
                            100: '#dbe3ed',
                            500: '#1E3A5F',
                            600: '#152b47',
                            700: '#0d1d30',
                        }
                    }
                }
            }
        }
    </script>
    
    <style>
        body {
            background-color: #f8fafc;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(226, 232, 240, 0.8);
            box-shadow: 0 4px 20px -2px rgba(0, 0, 0, 0.03), 0 2px 8px -1px rgba(0, 0, 0, 0.02);
        }
        .shimmer {
            background: linear-gradient(90deg, #f1f5f9 25%, #e2e8f0 50%, #f1f5f9 75%);
            background-size: 200% 100%;
            animation: shimmer-anim 1.5s infinite;
        }
        @keyframes shimmer-anim {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
    </style>
</head>
<body class="text-slate-800 antialiased min-h-screen flex flex-col">
    <!-- Navbar -->
    <nav class="bg-primary-500 text-white shadow-lg sticky top-0 z-40 border-b border-primary-600">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center space-x-8">
                    <span class="font-bold text-xl tracking-wide flex items-center gap-2.5">
                        <i data-lucide="building-2" class="h-6 w-6 text-blue-300"></i> CRM Supplier
                    </span>
                    <div class="hidden sm:flex space-x-3">
                        <a href="/" class="bg-white/10 text-white px-3.5 py-2 rounded-xl text-sm font-semibold tracking-wide shadow-inner">Dashboard</a>
                        <a href="/bot-config.html" class="text-blue-100 hover:text-white hover:bg-white/5 px-3.5 py-2 rounded-xl text-sm font-medium tracking-wide transition-all">Bot Config</a>
                    </div>
                </div>
                <div class="flex items-center space-x-4">
                    <span id="user-display-name" class="text-sm font-medium text-blue-100 hidden md:block bg-primary-600 px-3 py-1.5 rounded-xl border border-primary-700"></span>
                    <button onclick="handleLogout()" class="text-sm font-semibold bg-red-600/90 hover:bg-red-600 text-white px-4 py-2 rounded-xl transition-all shadow-md active:scale-95">
                        Logout
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Container -->
    <main class="flex-grow max-w-7xl mx-auto w-full px-4 sm:px-6 lg:px-8 py-8 space-y-8">
        
        <!-- Header & Action Section -->
        <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
            <div>
                <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight">Dashboard Overview</h1>
                <p class="text-sm text-slate-500 mt-1">Manage, filter, and monitor all company registered suppliers.</p>
            </div>
            <div class="flex items-center gap-3">
                <button 
                    id="export-btn"
                    onclick="handleExport()"
                    class="inline-flex items-center justify-center px-5  py-3 border border-transparent rounded-xl shadow-md text-sm font-semibold text-white bg-emerald-600 hover:bg-emerald-700 active:scale-95 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-emerald-500 transition-all disabled:opacity-50"
                >
                    <i data-lucide="file-spreadsheet" class="mr-2 h-4 w-4"></i>
                    <span id="export-btn-text">Export to Excel</span>
                </button>
            </div>
        </div>

        <!-- Stats Cards Grid -->
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
            <!-- Stat 1 -->
            <div class="glass-card rounded-2xl p-6 flex items-center justify-between transition-all hover:-translate-y-1 hover:shadow-lg duration-300">
                <div class="space-y-1">
                    <p class="text-sm font-medium text-slate-500">Total Suppliers</p>
                    <p id="stat-total" class="text-3xl font-bold text-slate-900">-</p>
                </div>
                <div class="p-3.5 bg-blue-50 text-blue-600 rounded-2xl border border-blue-100">
                    <i data-lucide="users" class="h-6 w-6"></i>
                </div>
            </div>
            <!-- Stat 2 -->
            <div class="glass-card rounded-2xl p-6 flex items-center justify-between transition-all hover:-translate-y-1 hover:shadow-lg duration-300">
                <div class="space-y-1">
                    <p class="text-sm font-medium text-slate-500">Pending Review</p>
                    <p id="stat-pending" class="text-3xl font-bold text-amber-600">-</p>
                </div>
                <div class="p-3.5 bg-amber-50 text-amber-600 rounded-2xl border border-amber-100">
                    <i data-lucide="clock" class="h-6 w-6"></i>
                </div>
            </div>
            <!-- Stat 3 -->
            <div class="glass-card rounded-2xl p-6 flex items-center justify-between transition-all hover:-translate-y-1 hover:shadow-lg duration-300">
                <div class="space-y-1">
                    <p class="text-sm font-medium text-slate-500">Approved</p>
                    <p id="stat-approved" class="text-3xl font-bold text-emerald-600">-</p>
                </div>
                <div class="p-3.5 bg-emerald-50 text-emerald-600 rounded-2xl border border-emerald-100">
                    <i data-lucide="check-circle" class="h-6 w-6"></i>
                </div>
            </div>
            <!-- Stat 4 -->
            <div class="glass-card rounded-2xl p-6 flex items-center justify-between transition-all hover:-translate-y-1 hover:shadow-lg duration-300">
                <div class="space-y-1">
                    <p class="text-sm font-medium text-slate-500">Blacklisted</p>
                    <p id="stat-blacklisted" class="text-3xl font-bold text-rose-600">-</p>
                </div>
                <div class="p-3.5 bg-rose-50 text-rose-600 rounded-2xl border border-rose-100">
                    <i data-lucide="alert-octagon" class="h-6 w-6"></i>
                </div>
            </div>
        </div>

        <!-- Main Data Directory Table Card -->
        <div class="glass-card rounded-2xl overflow-hidden shadow-sm">
            <!-- Table Action Header -->
            <div class="px-6 py-5 bg-white/70 border-b border-slate-100 flex flex-col lg:flex-row justify-between items-center gap-4">
                <div class="flex items-center space-x-2">
                    <i data-lucide="folder-search" class="text-slate-400 h-5 w-5"></i>
                    <h2 class="text-lg font-bold text-slate-800">Supplier Directory</h2>
                </div>
                
                <!-- Filters Form -->
                <div class="flex flex-col sm:flex-row items-stretch sm:items-center w-full lg:w-auto gap-3">
                    <!-- Status Filter -->
                    <select 
                        id="status-filter" 
                        onchange="handleFilterChange()"
                        class="bg-white border border-slate-200 rounded-xl px-4 py-2.5 text-sm font-medium text-slate-700 focus:outline-none focus:ring-2 focus:ring-primary-500"
                    >
                        <option value="">All Statuses</option>
                        <option value="draft">Draft</option>
                        <option value="pending_review">Pending Review</option>
                        <option value="approved">Approved</option>
                        <option value="rejected">Rejected</option>
                        <option value="blacklisted">Blacklisted</option>
                    </select>

                    <!-- Search Box -->
                    <div class="relative flex-grow min-w-[240px]">
                        <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
                            <i data-lucide="search" class="h-4 w-4 text-slate-400"></i>
                        </div>
                        <input
                            type="text"
                            id="search-input"
                            class="bg-white border border-slate-200 block w-full pl-10 pr-4 py-2.5 text-sm rounded-xl focus:outline-none focus:ring-2 focus:ring-primary-500"
                            placeholder="Search name, NPWP, city..."
                            onkeyup="handleSearchKeyUp(event)"
                        />
                    </div>

                    <!-- Search Button -->
                    <button 
                        onclick="executeSearch()"
                        class="bg-primary-500 hover:bg-primary-600 text-white font-semibold text-sm px-5 py-2.5 rounded-xl active:scale-95 transition-all shadow-md"
                    >
                        Search
                    </button>
                    
                    <!-- Reset/Refresh Button -->
                    <button 
                        onclick="resetFilters()"
                        title="Refresh & Reset Filters"
                        class="border border-slate-200 hover:bg-slate-50 text-slate-500 hover:text-slate-700 p-2.5 rounded-xl transition-all active:scale-95"
                    >
                        <i data-lucide="refresh-cw" class="h-4.5 w-4.5"></i>
                    </button>
                </div>
            </div>

            <!-- Table Responsive Wrapper -->
            <div class="overflow-x-auto">
                <table class="min-w-full divide-y divide-slate-100">
                    <thead class="bg-slate-50/50">
                        <tr>
                            <th scope="col" class="px-6 py-3.5 text-left text-xs font-semibold text-slate-500 uppercase tracking-wider">Company</th>
                            <th scope="col" class="px-6 py-3.5 text-left text-xs font-semibold text-slate-500 uppercase tracking-wider">PIC Info</th>
                            <th scope="col" class="px-6 py-3.5 text-left text-xs font-semibold text-slate-500 uppercase tracking-wider">Location</th>
                            <th scope="col" class="px-6 py-3.5 text-left text-xs font-semibold text-slate-500 uppercase tracking-wider">Status</th>
                            <th scope="col" class="px-6 py-3.5 class text-left text-xs font-semibold text-slate-500 uppercase tracking-wider">Source</th>
                        </tr>
                    </thead>
                    <tbody id="supplier-tbody" class="bg-white divide-y divide-slate-100">
                        <!-- Content will be dynamically populated here -->
                    </tbody>
                </table>
                
                <!-- Loading Skeleton -->
                <div id="table-skeleton" class="hidden">
                    <div class="divide-y divide-slate-100">
                        <div class="px-6 py-5 flex items-center justify-between shimmer h-16 w-full opacity-65 mb-1 rounded-sm"></div>
                        <div class="px-6 py-5 flex items-center justify-between shimmer h-16 w-full opacity-65 mb-1 rounded-sm"></div>
                        <div class="px-6 py-5 flex items-center justify-between shimmer h-16 w-full opacity-65 mb-1 rounded-sm"></div>
                    </div>
                </div>
            </div>

            <!-- Pagination Panel -->
            <div class="bg-white px-6 py-4 border-t border-slate-100 flex flex-col sm:flex-row items-center justify-between gap-4">
                <div id="pagination-info" class="text-sm text-slate-500 font-medium">
                    Showing <span class="font-semibold text-slate-900">-</span> to <span class="font-semibold text-slate-900">-</span> of <span class="font-semibold text-slate-900">-</span> results
                </div>
                <div class="flex space-x-2.5">
                    <button 
                        id="prev-btn"
                        onclick="changePage(-1)"
                        disabled
                        class="relative inline-flex items-center px-4 py-2 border border-slate-200 text-sm font-semibold rounded-xl text-slate-700 bg-white hover:bg-slate-50 active:scale-95 transition-all disabled:opacity-50 disabled:pointer-events-none"
                    >
                        Previous
                    </button>
                    <button 
                        id="next-btn"
                        onclick="changePage(1)"
                        disabled
                        class="relative inline-flex items-center px-4 py-2 border border-slate-200 text-sm font-semibold rounded-xl text-slate-700 bg-white hover:bg-slate-50 active:scale-95 transition-all disabled:opacity-50 disabled:pointer-events-none"
                    >
                        Next
                    </button>
                </div>
            </div>
        </div>
    </main>

    <!-- JavaScript Logic -->
    <script>
        // Setup API defaults and interceptors
        const API_URL = '/api/v1';
        
        axios.interceptors.request.use(config => {
            const token = localStorage.getItem('token');
            if (token) {
                config.headers.Authorization = `Bearer ${token}`;
            }
            return config;
        });

        axios.interceptors.response.use(
            response => response,
            error => {
                if (error.response && error.response.status === 401) {
                    localStorage.removeItem('token');
                    window.location.href = '/login.html';
                }
                return Promise.reject(error);
            }
        );

        // State management variables
        let currentPage = 1;
        let totalPages = 1;
        let searchQuery = '';
        let statusFilter = '';
        let exporting = false;
        let pollInterval = null;

        // Initialize App on DOM load
        document.addEventListener('DOMContentLoaded', () => {
            const token = localStorage.getItem('token');
            if (!token) {
                window.location.href = '/login.html';
                return;
            }

            // Extract username from jwt payload for display
            try {
                const payload = JSON.parse(atob(token.split('.')[1]));
                document.getElementById('user-display-name').innerText = `Workspace: ${payload.display_name || payload.email}`;
            } catch (e) {
                console.error("JWT parse error", e);
            }

            lucide.createIcons();
            initDashboard();
        });

        async function initDashboard() {
            currentPage = 1;
            await fetchDashboardData();
        }

        async function fetchDashboardData() {
            showLoading(true);
            try {
                const [statsRes, listRes] = await Promise.all([
                    axios.get(`${API_URL}/suppliers/stats`),
                    axios.get(`${API_URL}/suppliers`, {
                        params: {
                            page: currentPage,
                            search: searchQuery || undefined,
                            status: statusFilter || undefined
                        }
                    })
                ]);
                
                renderStats(statsRes.data.data);
                renderSuppliers(listRes.data.data, listRes.data.meta);
            } catch (err) {
                console.error("Failed to load dashboard data", err);
                showToast("Failed to load dashboard data. Please try again.", "error");
            } finally {
                showLoading(false);
            }
        }

        function showLoading(isLoading) {
            const skeleton = document.getElementById('table-skeleton');
            const tbody = document.getElementById('supplier-tbody');
            
            if (isLoading) {
                skeleton.classList.remove('hidden');
                tbody.innerHTML = '';
            } else {
                skeleton.classList.add('hidden');
            }
        }

        function renderStats(stats) {
            if (!stats) return;
            document.getElementById('stat-total').innerText = stats.total_active || 0;
            document.getElementById('stat-pending').innerText = stats.by_status?.pending_review || 0;
            document.getElementById('stat-approved').innerText = stats.by_status?.approved || 0;
            document.getElementById('stat-blacklisted').innerText = stats.by_status?.blacklisted || 0;
        }

        function renderSuppliers(suppliers, meta) {
            const tbody = document.getElementById('supplier-tbody');
            tbody.innerHTML = '';
            
            if (!suppliers || suppliers.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="5" class="px-6 py-16 text-center text-slate-500 font-medium">
                            <i data-lucide="inbox" class="h-10 w-10 mx-auto text-slate-300 mb-2"></i>
                            No suppliers registered under this filter.
                        </td>
                    </tr>
                `;
                updatePaginationControls(meta);
                lucide.createIcons();
                return;
            }

            suppliers.forEach(s => {
                const statusBadge = getStatusBadgeHTML(s.status);
                const sourceBadge = s.submitted_by_telegram_username 
                    ? `<span class="inline-flex items-center text-blue-600 bg-blue-50 px-2.5 py-1 rounded-lg border border-blue-100 font-medium text-xs">
                           <i data-lucide="send" class="h-3 w-3 mr-1"></i>
                           @${escapeHtml(s.submitted_by_telegram_username)}
                       </span>`
                    : `<span class="inline-flex items-center text-slate-600 bg-slate-50 px-2.5 py-1 rounded-lg border border-slate-100 font-medium text-xs">
                           <i data-lucide="monitor" class="h-3 w-3 mr-1"></i>
                           Web Dashboard
                       </span>`;

                const tr = document.createElement('tr');
                tr.className = 'hover:bg-slate-50/60 transition-colors border-b border-slate-100';
                tr.innerHTML = `
                    <td class="px-6 py-4.5 whitespace-nowrap">
                        <div class="text-sm font-semibold text-slate-900">${escapeHtml(s.company_name)}</div>
                        <div class="text-xs text-slate-400 mt-0.5 font-mono">NPWP: ${escapeHtml(s.npwp_number || '-')}</div>
                    </td>
                    <td class="px-6 py-4.5 whitespace-nowrap">
                        <div class="text-sm font-semibold text-slate-900">${escapeHtml(s.pic_name)}</div>
                        <div class="text-xs text-slate-400 mt-0.5">${escapeHtml(s.pic_phone)}</div>
                    </td>
                    <td class="px-6 py-4.5 whitespace-nowrap text-sm text-slate-600 font-medium">
                        ${escapeHtml(s.city || '-')}, ${escapeHtml(s.province || '-')}
                    </td>
                    <td class="px-6 py-4.5 whitespace-nowrap">
                        ${statusBadge}
                    </td>
                    <td class="px-6 py-4.5 whitespace-nowrap text-sm text-slate-500">
                        ${sourceBadge}
                    </td>
                `;
                tbody.appendChild(tr);
            });

            updatePaginationControls(meta);
            lucide.createIcons();
        }

        function getStatusBadgeHTML(status) {
            const styles = {
                'draft': 'bg-slate-50 text-slate-600 border-slate-200',
                'pending_review': 'bg-amber-50 text-amber-800 border-amber-200',
                'approved': 'bg-emerald-50 text-emerald-800 border-emerald-200',
                'rejected': 'bg-rose-50 text-rose-800 border-rose-200',
                'blacklisted': 'bg-slate-900 text-slate-100 border-slate-950',
            };
            const label = (status || 'draft').replace('_', ' ').toUpperCase();
            const style = styles[status] || styles['draft'];
            return `<span class="px-2.5 py-1 inline-flex text-xs leading-5 font-bold rounded-full border ${style}">${label}</span>`;
        }

        function updatePaginationControls(meta) {
            if (!meta) return;
            currentPage = meta.page;
            totalPages = meta.total_pages;

            const startIdx = (meta.page - 1) * meta.per_page + (meta.total_items > 0 ? 1 : 0);
            const endIdx = (meta.page - 1) * meta.per_page + (meta.total_items > 0 ? (meta.total_items - startIdx < meta.per_page ? meta.total_items : startIdx + meta.per_page - 1) : 0);

            document.getElementById('pagination-info').innerHTML = `
                Showing <span class="font-bold text-slate-800">${startIdx}</span> to <span class="font-bold text-slate-800">${endIdx}</span> of <span class="font-bold text-slate-800">${meta.total_items}</span> results
            `;

            const prevBtn = document.getElementById('prev-btn');
            const nextBtn = document.getElementById('next-btn');

            prevBtn.disabled = !meta.has_prev;
            nextBtn.disabled = !meta.has_next;
        }

        function changePage(direction) {
            currentPage += direction;
            fetchDashboardData();
        }

        function handleFilterChange() {
            statusFilter = document.getElementById('status-filter').value;
            currentPage = 1;
            fetchDashboardData();
        }

        function handleSearchKeyUp(event) {
            if (event.key === 'Enter') {
                executeSearch();
            }
        }

        function executeSearch() {
            searchQuery = document.getElementById('search-input').value.trim();
            currentPage = 1;
            fetchDashboardData();
        }

        function resetFilters() {
            document.getElementById('search-input').value = '';
            document.getElementById('status-filter').value = '';
            searchQuery = '';
            statusFilter = '';
            currentPage = 1;
            fetchDashboardData();
        }

        async function handleExport() {
            if (exporting) return;
            
            const btn = document.getElementById('export-btn');
            const btnText = document.getElementById('export-btn-text');
            
            try {
                exporting = true;
                btn.disabled = true;
                btnText.innerText = 'Requesting export...';
                
                const res = await axios.post(`${API_URL}/suppliers/export`, {}, {
                    responseType: 'blob'
                });

                // Check if response is actually a JSON status descriptor or file blob
                if (res.data.type === 'application/json') {
                    const text = await res.data.text();
                    const json = JSON.parse(text);
                    
                    if (json.status === 'queued') {
                        showToast(`Export task queued. Processing report...`, "success");
                        btnText.innerText = 'Generating file...';
                        pollExportTask(json.task_id);
                    }
                } else {
                    // Sync direct file download
                    downloadFileBlob(res.data, res.headers);
                    showToast("Export completed successfully!", "success");
                    btn.disabled = false;
                    btnText.innerText = 'Export to Excel';
                    exporting = false;
                }
            } catch (err) {
                console.error("Export request failed", err);
                showToast("Export request failed. Try again.", "error");
                btn.disabled = false;
                btnText.innerText = 'Export to Excel';
                exporting = false;
            }
        }

        function pollExportTask(taskId) {
            if (pollInterval) clearInterval(pollInterval);
            
            pollInterval = setInterval(async () => {
                try {
                    const res = await axios.get(`${API_URL}/suppliers/export/${taskId}`);
                    const status = res.data.data.status;
                    
                    if (status === 'completed') {
                        clearInterval(pollInterval);
                        
                        // Download output file via completed presigned URL
                        window.location.href = res.data.data.download_url;
                        showToast("Export download triggered!", "success");
                        
                        resetExportButton();
                    } else if (status === 'failed' || status === 'not_found') {
                        clearInterval(pollInterval);
                        showToast("Export generation failed on server.", "error");
                        resetExportButton();
                    }
                } catch (e) {
                    clearInterval(pollInterval);
                    showToast("Failed to verify export completion status.", "error");
                    resetExportButton();
                }
            }, 3000);
        }

        function resetExportButton() {
            const btn = document.getElementById('export-btn');
            const btnText = document.getElementById('export-btn-text');
            btn.disabled = false;
            btnText.innerText = 'Export to Excel';
            exporting = false;
        }

        function downloadFileBlob(blob, headers) {
            const url = window.URL.createObjectURL(new Blob([blob]));
            const link = document.createElement('a');
            link.href = url;
            
            const disposition = headers['content-disposition'];
            let filename = 'suppliers_export.xlsx';
            if (disposition && disposition.includes('attachment')) {
                const matches = /filename[^;=\n]*=((['"]).*?\2|[^;\n]*)/.exec(disposition);
                if (matches != null && matches[1]) { 
                    filename = matches[1].replace(/['"]/g, '');
                }
            }
            
            link.setAttribute('download', filename);
            document.body.appendChild(link);
            link.click();
            link.remove();
        }

        function handleLogout() {
            localStorage.removeItem('token');
            window.location.href = '/login.html';
        }

        function showToast(message, type = 'success') {
            const existing = document.getElementById('floating-toast');
            if (existing) existing.remove();

            const toast = document.createElement('div');
            toast.id = 'floating-toast';
            
            const bgColor = type === 'success' ? 'bg-emerald-600' : 'bg-rose-600';
            const iconName = type === 'success' ? 'check-circle' : 'alert-circle';
            
            toast.className = `fixed bottom-5 right-5 z-50 flex items-center gap-3 text-white px-5 py-3 rounded-2xl shadow-2xl transition-all duration-300 transform translate-y-10 opacity-0 ${bgColor} border border-white/10`;
            toast.innerHTML = `
                <i data-lucide="${iconName}" class="h-5 w-5"></i>
                <span class="text-sm font-semibold">${message}</span>
            `;
            
            document.body.appendChild(toast);
            lucide.createIcons();

            setTimeout(() => {
                toast.classList.remove('translate-y-10', 'opacity-0');
            }, 10);

            setTimeout(() => {
                toast.classList.add('translate-y-10', 'opacity-0');
                setTimeout(() => toast.remove(), 300);
            }, 4000);
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.toString()
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }
    </script>
</body>
