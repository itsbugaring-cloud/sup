<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supplier CRM - Dashboard</title>
    
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Axios -->
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#1E3A5F',
                        secondary: '#F0F4F8'
                    }
                }
            }
        }
    </script>
    <style>
        .glass-panel {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 font-sans antialiased min-h-screen flex flex-col">
    <!-- Navbar -->
    <nav class="bg-primary text-white shadow-md">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <span class="font-bold text-xl tracking-wide flex items-center gap-2">
                        <i data-lucide="building-2"></i> CRM Supplier
                    </span>
                    <div class="ml-10 flex items-baseline space-x-4">
                        <a href="/" class="bg-white/10 text-white px-3 py-2 rounded-md text-sm font-medium">Dashboard</a>
                        <a href="/bot-config.html" class="text-gray-300 hover:text-white px-3 py-2 rounded-md text-sm font-medium">Bot Config</a>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <div id="root" class="flex-grow max-w-7xl mx-auto w-full px-4 sm:px-6 lg:px-8 py-8"></div>

    <script type="text/babel">
        // Auth interceptor setup
        axios.interceptors.request.use(config => {
            config.headers.Authorization = `Bearer ${localStorage.getItem('token') || ''}`;
            return config;
        });

        // Initialize Lucide icons on mount and update
        function useLucide() {
            React.useEffect(() => {
                lucide.createIcons();
            });
        }

        function StatCard({ title, value, icon, colorClass }) {
            return (
                <div className="glass-panel rounded-lg p-5 flex items-center justify-between transition-transform hover:scale-105 duration-200 cursor-default">
                    <div>
                        <p className="text-sm font-medium text-gray-500 truncate">{title}</p>
                        <p className="mt-1 text-3xl font-semibold text-gray-900">{value}</p>
                    </div>
                    <div className={`p-3 rounded-full ${colorClass}`}>
                        <i data-lucide={icon} className="h-6 w-6"></i>
                    </div>
                </div>
            );
        }

        function StatusBadge({ status }) {
            const styles = {
                'draft': 'bg-gray-100 text-gray-800',
                'pending_review': 'bg-yellow-100 text-yellow-800',
                'approved': 'bg-green-100 text-green-800',
                'rejected': 'bg-red-100 text-red-800',
                'blacklisted': 'bg-gray-800 text-gray-100',
            };
            const label = status.replace('_', ' ').toUpperCase();
            return (
                <span className={`px-2 inline-flex text-xs leading-5 font-semibold rounded-full ${styles[status] || styles['draft']}`}>
                    {label}
                </span>
            );
        }

        function App() {
            useLucide();
            const [stats, setStats] = React.useState(null);
            const [suppliers, setSuppliers] = React.useState([]);
            const [meta, setMeta] = React.useState({ page: 1, total_pages: 1, total_items: 0 });
            const [loading, setLoading] = React.useState(true);
            const [exporting, setExporting] = React.useState(false);
            const [search, setSearch] = React.useState('');
            
            // Polling interval ref for ARQ exports
            const pollInterval = React.useRef(null);

            const loadDashboard = async (page = 1, searchQuery = search) => {
                try {
                    setLoading(true);
                    const [statsRes, listRes] = await Promise.all([
                        axios.get('/api/v1/suppliers/stats'),
                        axios.get('/api/v1/suppliers', { params: { page, search: searchQuery } })
                    ]);
                    setStats(statsRes.data.data);
                    setSuppliers(listRes.data.data);
                    setMeta(listRes.data.meta);
                } catch (err) {
                    console.error("Dashboard load failed", err);
                } finally {
                    setLoading(false);
                }
            };

            React.useEffect(() => {
                loadDashboard();
            }, []);

            const handleSearch = (e) => {
                e.preventDefault();
                loadDashboard(1, search);
            };

            const handleExport = async () => {
                if (exporting) return;
                try {
                    setExporting(true);
                    const res = await axios.post('/api/v1/suppliers/export', {}, {
                        responseType: 'blob' // Essential for binary downloads
                    });
                    
                    // Check if it's JSON (Task Queued) or actual Blob (Sync download)
                    if (res.data.type === 'application/json') {
                        // Read blob as text
                        const text = await res.data.text();
                        const data = JSON.parse(text);
                        if (data.status === 'queued') {
                            alert(`Export queued. ${data.message}`);
                            pollExportTask(data.task_id);
                        }
                    } else {
                        // Trigger Sync Download
                        const url = window.URL.createObjectURL(new Blob([res.data]));
                        const link = document.createElement('a');
                        link.href = url;
                        // Extract filename from header
                        const disposition = res.headers['content-disposition'];
                        let filename = 'export.xlsx';
                        if (disposition && disposition.indexOf('attachment') !== -1) {
                            var filenameRegex = /filename[^;=\n]*=((['"]).*?\2|[^;\n]*)/;
                            var matches = filenameRegex.exec(disposition);
                            if (matches != null && matches[1]) { 
                                filename = matches[1].replace(/['"]/g, '');
                            }
                        }
                        link.setAttribute('download', filename);
                        document.body.appendChild(link);
                        link.click();
                        link.remove();
                        setExporting(false);
                    }
                } catch (err) {
                    console.error(err);
                    alert("Export failed.");
                    setExporting(false);
                }
            };

            const pollExportTask = async (taskId) => {
                pollInterval.current = setInterval(async () => {
                    try {
                        const res = await axios.get(`/api/v1/suppliers/export/${taskId}`);
                        const status = res.data.data.status;
                        
                        if (status === 'completed') {
                            clearInterval(pollInterval.current);
                            setExporting(false);
                            // Trigger download from pre-signed URL
                            window.location.href = res.data.data.download_url;
                        } else if (status === 'failed' || status === 'not_found') {
                            clearInterval(pollInterval.current);
                            setExporting(false);
                            alert("Export task failed on the server.");
                        }
                        // if running, keep polling
                    } catch (e) {
                        clearInterval(pollInterval.current);
                        setExporting(false);
                        console.error("Polling error", e);
                    }
                }, 3000); // Poll every 3 seconds
            };

            return (
                <div className="space-y-6">
                    {/* Header */}
                    <div className="flex flex-col md:flex-row md:items-center md:justify-between">
                        <div>
                            <h1 className="text-2xl font-bold text-gray-900">Dashboard Overview</h1>
                            <p className="text-sm text-gray-500 mt-1">Manage and monitor supplier registrations.</p>
                        </div>
                        <div className="mt-4 md:mt-0">
                            <button 
                                onClick={handleExport}
                                disabled={exporting}
                                className="inline-flex items-center px-4 py-2 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-green-600 hover:bg-green-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-green-500 disabled:opacity-50"
                            >
                                <i data-lucide="file-spreadsheet" className="mr-2 h-4 w-4"></i>
                                {exporting ? 'Exporting...' : 'Export to Excel'}
                            </button>
                        </div>
                    </div>

                    {/* Stats Cards */}
                    <div className="grid grid-cols-1 gap-5 sm:grid-cols-2 lg:grid-cols-4">
                        <StatCard 
                            title="Total Active Suppliers" 
                            value={stats?.total_active || 0} 
                            icon="users" 
                            colorClass="bg-blue-100 text-blue-600" 
                        />
                        <StatCard 
                            title="Pending Review" 
                            value={stats?.by_status?.pending_review || 0} 
                            icon="clock" 
                            colorClass="bg-yellow-100 text-yellow-600" 
                        />
                        <StatCard 
                            title="Approved" 
                            value={stats?.by_status?.approved || 0} 
                            icon="check-circle" 
                            colorClass="bg-green-100 text-green-600" 
                        />
                        <StatCard 
                            title="Blacklisted" 
                            value={stats?.by_status?.blacklisted || 0} 
                            icon="alert-octagon" 
                            colorClass="bg-red-100 text-red-600" 
                        />
                    </div>

                    {/* Table Section */}
                    <div className="glass-panel rounded-lg shadow overflow-hidden">
                        <div className="px-6 py-4 border-b border-gray-200 bg-white flex flex-col sm:flex-row justify-between items-center gap-4">
                            <h2 className="text-lg font-medium text-gray-900">Supplier Directory</h2>
                            <form onSubmit={handleSearch} className="flex w-full sm:w-auto">
                                <div className="relative rounded-md shadow-sm flex-grow">
                                    <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                        <i data-lucide="search" className="h-4 w-4 text-gray-400"></i>
                                    </div>
                                    <input
                                        type="text"
                                        value={search}
                                        onChange={e => setSearch(e.target.value)}
                                        className="focus:ring-primary focus:border-primary block w-full pl-10 sm:text-sm border-gray-300 rounded-md py-2 border"
                                        placeholder="Search name, NPWP, city..."
                                    />
                                </div>
                                <button type="submit" className="ml-2 inline-flex items-center px-3 py-2 border border-transparent text-sm leading-4 font-medium rounded-md text-primary bg-blue-100 hover:bg-blue-200">
                                    Search
                                </button>
                            </form>
                        </div>
                        
                        <div className="overflow-x-auto">
                            <table className="min-w-full divide-y divide-gray-200">
                                <thead className="bg-gray-50">
                                    <tr>
                                        <th scope="col" className="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Company</th>
                                        <th scope="col" className="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">PIC Info</th>
                                        <th scope="col" className="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Location</th>
                                        <th scope="col" className="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Status</th>
                                        <th scope="col" className="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Telegram Submission</th>
                                    </tr>
                                </thead>
                                <tbody className="bg-white divide-y divide-gray-200">
                                    {loading ? (
                                        <tr><td colSpan="5" className="px-6 py-12 text-center text-gray-500">Loading...</td></tr>
                                    ) : suppliers.length === 0 ? (
                                        <tr><td colSpan="5" className="px-6 py-12 text-center text-gray-500">No suppliers found.</td></tr>
                                    ) : suppliers.map((s) => (
                                        <tr key={s.id} className="hover:bg-gray-50 transition-colors">
                                            <td className="px-6 py-4 whitespace-nowrap">
                                                <div className="text-sm font-medium text-gray-900">{s.company_name}</div>
                                                <div className="text-sm text-gray-500">NPWP: {s.npwp_number || '-'}</div>
                                            </td>
                                            <td className="px-6 py-4 whitespace-nowrap">
                                                <div className="text-sm text-gray-900">{s.pic_name}</div>
                                                <div className="text-sm text-gray-500">{s.pic_phone}</div>
                                            </td>
                                            <td className="px-6 py-4 whitespace-nowrap text-sm text-gray-500">
                                                {s.city || '-'}, {s.province || '-'}
                                            </td>
                                            <td className="px-6 py-4 whitespace-nowrap">
                                                <StatusBadge status={s.status} />
                                            </td>
                                            <td className="px-6 py-4 whitespace-nowrap text-sm text-gray-500">
                                                {s.submitted_by_telegram_username ? (
                                                    <span className="flex items-center text-blue-600">
                                                        <i data-lucide="send" className="h-3 w-3 mr-1"></i>
                                                        @{s.submitted_by_telegram_username}
                                                    </span>
                                                ) : (
                                                    <span className="text-gray-400">Web Dashboard</span>
                                                )}
                                            </td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>

                        {/* Pagination */}
                        <div className="bg-white px-4 py-3 border-t border-gray-200 sm:px-6 flex items-center justify-between">
                            <div className="text-sm text-gray-700">
                                Showing <span className="font-medium">{(meta.page - 1) * 20 + (suppliers.length > 0 ? 1 : 0)}</span> to <span className="font-medium">{(meta.page - 1) * 20 + suppliers.length}</span> of <span className="font-medium">{meta.total_items}</span> results
                            </div>
                            <div className="flex space-x-2">
                                <button 
                                    disabled={!meta.has_prev}
                                    onClick={() => loadDashboard(meta.page - 1, search)}
                                    className="relative inline-flex items-center px-4 py-2 border border-gray-300 text-sm font-medium rounded-md text-gray-700 bg-white hover:bg-gray-50 disabled:opacity-50"
                                >
                                    Previous
                                </button>
                                <button 
                                    disabled={!meta.has_next}
                                    onClick={() => loadDashboard(meta.page + 1, search)}
                                    className="relative inline-flex items-center px-4 py-2 border border-gray-300 text-sm font-medium rounded-md text-gray-700 bg-white hover:bg-gray-50 disabled:opacity-50"
                                >
                                    Next
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
