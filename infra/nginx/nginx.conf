# infra/nginx/nginx.conf
# ==============================================================================
# Nginx Main Configuration — Supplier CRM Reverse Proxy
# Handles: TLS termination, compression, rate limiting, security headers.
# ==============================================================================

user nginx;
worker_processes auto;       # One worker per CPU core
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

# File descriptor limits — must match ulimit in OS
worker_rlimit_nofile 65535;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    # ── MIME types ────────────────────────────────────────────────────────────
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ── Logging format ────────────────────────────────────────────────────────
    log_format json_combined escape=json
        '{'
            '"time":"$time_iso8601",'
            '"remote_addr":"$remote_addr",'
            '"request_id":"$request_id",'
            '"method":"$request_method",'
            '"uri":"$request_uri",'
            '"status":$status,'
            '"body_bytes_sent":$body_bytes_sent,'
            '"request_time":$request_time,'
            '"upstream_response_time":"$upstream_response_time",'
            '"http_referrer":"$http_referer",'
            '"http_user_agent":"$http_user_agent"'
        '}';

    access_log /var/log/nginx/access.log json_combined;

    # ── Performance ───────────────────────────────────────────────────────────
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;                # Hide Nginx version

    # ── Gzip Compression ──────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/xml+rss
        application/vnd.ms-excel
        image/svg+xml;

    # ── Rate limiting zones ───────────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api_general:10m rate=100r/m;
    limit_req_zone $binary_remote_addr zone=api_login:10m rate=5r/m;
    limit_req_zone $binary_remote_addr zone=api_export:10m rate=3r/m;
    limit_req_zone $binary_remote_addr zone=bot_webhook:10m rate=30r/s;
    limit_req_status 429;

    # ── Request ID ────────────────────────────────────────────────────────────
    map $http_x_request_id $request_id {
        default $http_x_request_id;
        ""      $request_id;
    }

    # ── Upstream definitions ──────────────────────────────────────────────────
    upstream crm_backend {
        server backend:8000;
        keepalive 32;
    }

    upstream crm_frontend {
        server frontend:80;
        keepalive 16;
    }

    # ── Include virtual host configs ──────────────────────────────────────────
    include /etc/nginx/conf.d/*.conf;
}
