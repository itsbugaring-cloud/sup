# infra/nginx/conf.d/crm.conf
# ==============================================================================
# Nginx Virtual Host — Supplier CRM
# Proxies: API → backend:8000, Frontend → frontend:80
# ==============================================================================

server {
    listen 80;
    server_name _;

    # ── Security Headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header X-Request-ID $request_id always;

    # Content Security Policy (adjust allowed sources per environment)
    add_header Content-Security-Policy
        "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' fonts.googleapis.com; font-src 'self' fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self' wss: ws:;"
        always;

    # ── Client Upload Limits ──────────────────────────────────────────────────
    client_max_body_size 50M;       # Max file upload size
    client_body_timeout 60s;
    client_header_timeout 30s;

    # ── Health check (no rate limiting) ───────────────────────────────────────
    location = /health {
        access_log off;
        return 200 '{"status":"ok"}';
        add_header Content-Type application/json;
    }

    # ── Telegram Bot Webhook ──────────────────────────────────────────────────
    location = /api/v1/bot/webhook {
        limit_req zone=bot_webhook burst=50 nodelay;
        proxy_pass http://crm_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    # ── Auth endpoints (strict rate limiting) ─────────────────────────────────
    location ~ ^/api/v1/(auth/login|auth/refresh) {
        limit_req zone=api_login burst=10 nodelay;
        proxy_pass http://crm_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
    }

    # ── Export endpoints (limited throughput) ─────────────────────────────────
    location ~ ^/api/v1/.*export.* {
        limit_req zone=api_export burst=5 nodelay;
        proxy_pass http://crm_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
        proxy_read_timeout 120s;    # Long timeout for export preparation
    }

    # ── All other API endpoints ───────────────────────────────────────────────
    location /api/ {
        limit_req zone=api_general burst=200 nodelay;
        proxy_pass http://crm_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
        proxy_http_version 1.1;
        proxy_set_header Connection "";    # Enable HTTP keepalive to upstream
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # ── Static files (from backend) ───────────────────────────────────────────
    location /staticfiles/ {
        alias /var/www/staticfiles/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Frontend (SPA — all other routes) ────────────────────────────────────
    location / {
        proxy_pass http://crm_frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";    # WebSocket support for HMR
    }
}
